name: Vast.ai LLM Benchmark

on:
  workflow_dispatch:
    inputs:
      gpu:
        description: 'GPU model to test'
        required: true
        default: 'RTX_4090'
      model:
        description: 'LLM model name'
        required: true
        default: 'facebook/opt-125m'
        type: choice
        options:
        - 'facebook/opt-125m'
        - 'google/gemma-4-E2B-it'
        - 'google/gemma-4-E4B-it'
        - 'google/gemma-2-9b-it'
        - 'mistralai/Mistral-Small-Instruct-2409'
        - 'mistralai/Mistral-Large-Instruct-2411'
      concurrency_levels:
        description: 'Space-separated concurrency levels'
        required: true
        default: '1 4 16'
      requests_per_level:
        description: 'Number of requests per concurrency level'
        required: true
        default: '10'
      template_hash:
        description: 'Vast.ai template hash'
        required: false
        default: '38b2b68cf896e8582dff6f305a2041b1'
      prompt:
        description: 'Benchmark prompt'
        required: true
        default: 'Explain quantum physics in one sentence.'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Provision Vast.ai Instance
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python provision.py \
          --gpu "${{ github.event.inputs.gpu }}" \
          --model "${{ github.event.inputs.model }}" \
          ${{ github.event.inputs.template_hash && format('--template-hash {0}', github.event.inputs.template_hash) || '' }}

    - name: Run Benchmark
      run: |
        python benchmark.py \
          --gpu "${{ github.event.inputs.gpu }}" \
          --model "${{ github.event.inputs.model }}" \
          --concurrency-levels ${{ github.event.inputs.concurrency_levels }} \
          --requests-per-level ${{ github.event.inputs.requests_per_level }} \
          --prompt "${{ github.event.inputs.prompt }}"

    - name: Teardown Instance
      if: always()
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        python teardown.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: benchmark_*.json
