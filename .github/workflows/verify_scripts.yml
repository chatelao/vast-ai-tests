name: Verify Scripting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-with-mock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run mock server
      run: |
        python tests/mock_server.py &
        # Wait for mock server to be ready
        timeout 30 bash -c 'until curl -sf http://localhost:8000/v1/models; do sleep 1; done' || (echo "Mock server failed to start" && exit 1)

    - name: Run benchmark against mock server
      run: |
        python benchmark.py \
          --url http://localhost:8000 \
          --model tiny-model \
          --gpu mock-gpu \
          --concurrency-levels 1 2 \
          --requests-per-level 5

    - name: Check benchmark results
      run: |
        ls benchmark_mock-gpu_*.json
        cat benchmark_mock-gpu_*.json | jq '.'

  verify-with-vllm:
    runs-on: ubuntu-latest
    env:
      VLLM_TARGET_DEVICE: cpu
      VLLM_DEVICE: cpu
      VLLM_NO_USAGE_STATS: 1
      # GHA runners have limited RAM (~7GB), reduce KV cache space
      VLLM_CPU_KVCACHE_SPACE: 1
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install vLLM-CPU which is optimized for CPU-only environments
        # We do NOT install the 'vllm' package as it can conflict with 'vllm-cpu'
        pip install vllm-cpu --extra-index-url https://download.pytorch.org/whl/cpu

    - name: Run Micro Runtime Test (vLLM on CPU)
      run: |
        python tests/micro_runtime_test.py
